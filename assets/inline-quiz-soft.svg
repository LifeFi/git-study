    <text x="582" y="296" fill="#F5F6F2" font-size="20" font-family="JetBrains Mono, Menlo, monospace">`calculate_metrics` function?</text>

    <text x="582" y="360" fill="#F5F6F2" font-size="18" font-family="JetBrains Mono, Menlo, monospace">A) To fix a bug in data processing.</text>
    <text x="562" y="410" fill="#F5F6F2" font-size="18" font-family="JetBrains Mono, Menlo, monospace">&gt; B) To improve performance and</text>
