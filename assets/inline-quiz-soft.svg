    <text x="582" y="500" fill="#F5F6F2" font-size="18" font-family="JetBrains Mono, Menlo, monospace">C) To add new functionality.</text>
    <text x="582" y="548" fill="#F5F6F2" font-size="18" font-family="JetBrains Mono, Menlo, monospace">D) To comply with new style guide.</text>

